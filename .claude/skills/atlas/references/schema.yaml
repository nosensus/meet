# sales-script - Codebase Schema
# Machine-readable structure for AI agent navigation
# Generated by Cartographer
# Last Updated: 2026-06-24

metadata:
  project: sales-script
  atlas_version: '3.0'
  generated: 2026-06-24
  type: frontend-spa
  organization_style: domains
  stack:
    language: TypeScript
    version: '5.6'
    framework: React
    framework_version: '18.3'
    styling: plain CSS (single global stylesheet, BEM-ish class names)
    routing: none (single-page, in-memory view switch via useState)
    bundler: Vite 5
    i18n: custom (no library) — RU + UZ-latin via UI dict + parallel datasets
  architecture: >
    Single-page React app with no backend. Content (sales-call decision tree,
    tips, management cases) lives as typed data in src/data/. Presentational
    components in src/components/ render it. App.tsx is the shell: it switches
    between three views (script / tips / ambax) and owns the decision-tree
    traversal state. No router, no state library, no tests.

domains:
  app-shell:
    location: src/
    count: 4
    purpose: >
      Root of the app. Owns top-level view switching (script/tips/ambax tabs),
      the interactive decision-tree path state (traverse, back, reset), the
      shared TypeScript types, the entry point, and the global stylesheet.
    confidence: high
    key_files:
      - src/App.tsx
      - src/types.ts
      - src/main.tsx
      - src/styles.css
    documentation: references/domains/app-shell.md

  components:
    location: src/components/
    count: 5
    purpose: >
      Presentational React components. StepCard/SayCard/CallLog render the
      interactive script flow; Blocks is a shared filterable accordion used by
      both the Tips and Ambax views; PayScheme is an Ambax-specific static table.
    confidence: high
    key_files:
      - src/components/StepCard.tsx
      - src/components/SayCard.tsx
      - src/components/CallLog.tsx
      - src/components/Blocks.tsx
      - src/components/PayScheme.tsx
    documentation: references/domains/components.md

  content-data:
    location: src/data/
    count: 6
    purpose: >
      The actual sales-training content as typed, version-controlled data
      (no CMS, no fetch). script.ts is a directed graph of ~25 conversation
      nodes; tips.ts and ambax.ts are flat arrays of categorized cards.
      Each has a parallel *.uz.ts twin (Uzbek-latin) with identical keys/ids.
    confidence: high
    key_files:
      - src/data/script.ts
      - src/data/script.uz.ts
      - src/data/tips.ts
      - src/data/tips.uz.ts
      - src/data/ambax.ts
      - src/data/ambax.uz.ts
    documentation: references/domains/content-data.md

  i18n:
    location: src/i18n.ts
    count: 1
    purpose: >
      Bilingual support (RU / UZ-latin), no library. Lang type, LANGS switcher
      list, load/saveLang (localStorage), and the UI string dictionary for all
      chrome. Content itself is translated via the parallel src/data/*.uz.ts
      datasets and PayScheme's own per-language content.
    confidence: high
    key_files:
      - src/i18n.ts
    documentation: references/domains/i18n.md

file_patterns:
  react_component:
    pattern: 'src/components/*.tsx'
    count: 5
    purpose: PascalCase presentational component, default export, local `interface Props`
    example: src/components/StepCard.tsx

  content_dataset:
    pattern: 'src/data/*.ts'
    count: 6
    purpose: Module exporting a typed const dataset (Record graph or array of cards); *.uz.ts = Uzbek twin
    example: src/data/tips.ts

  shared_types:
    pattern: 'src/types.ts'
    count: 1
    purpose: Shared domain interfaces for the script graph (ScriptNode, ScriptOption, etc.)
    example: src/types.ts

# Task-oriented entry points for common developer workflows
task_mappings:
  edit_script_tree:
    description: 'Add or edit a step/branch in the interactive sales-call decision tree'
    entry_point: src/data/script.ts
    patterns:
      - add-script-node

  add_card:
    description: 'Add a tip or Ambax management case'
    entry_point: src/data/tips.ts
    patterns:
      - add-content-item

  add_component:
    description: 'Add a new presentational React component'
    entry_point: src/components/
    patterns:
      - add-component

  add_view:
    description: 'Add a new top-level tab/view alongside script/tips/ambax'
    entry_point: src/App.tsx
    patterns:
      - add-view

  add_translation:
    description: 'Add a UI string, translate content, or add a new language'
    entry_point: src/i18n.ts
    patterns:
      - add-translation

config_files:
  entry_point: src/main.tsx
  package_manager: pnpm
  build_command: 'pnpm build'   # tsc && vite build
  test_command: 'none configured'
  lint_command: 'none configured (tsc --noEmit via build acts as type-check)'
  env_template: none
  files:
    - path: package.json
      purpose: 'Dependencies and scripts (dev/build/preview)'
    - path: vite.config.ts
      purpose: 'Vite config; base path "/meet/" for GitHub Pages deploy'
    - path: tsconfig.json
      purpose: 'Strict TS config, noUnusedLocals/Parameters, react-jsx'
    - path: index.html
      purpose: 'HTML shell mounting #root'
    - path: .github/
      purpose: 'GitHub Actions (Pages deploy)'

testing:
  framework: none
  location: n/a
  pattern: 'no test files present'
  coverage: none

documentation:
  domains:
    - references/domains/app-shell.md
    - references/domains/components.md
    - references/domains/content-data.md
    - references/domains/i18n.md
  patterns:
    - references/patterns/add-script-node.md
    - references/patterns/add-component.md
    - references/patterns/add-content-item.md
    - references/patterns/add-view.md
    - references/patterns/add-translation.md

validation:
  working_dir: .
  commands:
    - name: type-check + build
      command: pnpm build
    - name: dev server
      command: pnpm dev

# =============================================================================
# PATTERN CONVENTIONS
# =============================================================================

keyword_index:
  script: add-script-node
  node: add-script-node
  step: add-script-node
  branch: add-script-node
  tree: add-script-node
  objection: add-script-node
  option: add-script-node
  say: add-script-node
  component: add-component
  ui: add-component
  card: add-content-item
  tip: add-content-item
  ambax: add-content-item
  case: add-content-item
  view: add-view
  tab: add-view
  i18n: add-translation
  translation: add-translation
  language: add-translation
  locale: add-translation
  uz: add-translation
  uzbek: add-translation

patterns:
  add-script-node:
    keywords:
      - script
      - node
      - step
      - branch
      - tree
      - objection
      - option
      - say
    file_convention: 'Add a keyed entry to the SCRIPT record in src/data/script.ts'
    registration:
      - file: 'src/data/script.ts'
        action: 'Add the new node under its key in the SCRIPT object; reference it from a parent option`s `next`'
    validation_commands:
      - 'pnpm build'
    pattern_guide: references/patterns/add-script-node.md
    example_files:
      - 'src/data/script.ts'
    related:
      - add-view
    anti_patterns_summary:
      - 'Never point an option`s `next` at a node key that does not exist in SCRIPT (App reads SCRIPT[path.nodeId] directly and will crash).'
      - 'Option `id` must be unique within its node — selection and the back/reset cascade key off it.'
      - 'A leaf node (no `next` on any option) ends the branch; do not leave a dangling `next` to nowhere.'

  add-component:
    keywords:
      - component
      - ui
    file_convention: 'src/components/{Name}.tsx — PascalCase, default export, local `interface Props`'
    registration:
      - file: 'src/App.tsx (or a parent component)'
        action: 'Import and render the new component'
    validation_commands:
      - 'pnpm build'
    pattern_guide: references/patterns/add-component.md
    example_files:
      - 'src/components/StepCard.tsx'
      - 'src/components/CallLog.tsx'
    related:
      - add-view
    anti_patterns_summary:
      - 'Components are presentational: take data via props, keep only local UI state (open/copied/filter). Decision-tree path state lives in App.tsx — do not duplicate it.'
      - 'Style via className against src/styles.css; there are no CSS modules or styled-components.'
      - 'Default-export the component; named imports of these components are not used anywhere.'

  add-content-item:
    keywords:
      - card
      - tip
      - ambax
      - case
    file_convention: 'Append an object to the TIPS array (src/data/tips.ts) or AMBAX array (src/data/ambax.ts)'
    registration:
      - file: 'src/data/tips.ts | src/data/ambax.ts'
        action: 'Add the item; its `category` must already exist in the matching *_CATEGORIES tuple'
    validation_commands:
      - 'pnpm build'
    pattern_guide: references/patterns/add-content-item.md
    example_files:
      - 'src/data/tips.ts'
      - 'src/data/ambax.ts'
    anti_patterns_summary:
      - 'A new `category` value only appears as a filter chip if added to the corresponding *_CATEGORIES tuple; an item with an unlisted category renders only under "Все".'
      - 'Both TIPS and AMBAX use the same `Tip` interface (ambax.ts imports Tip from tips.ts) — keep the shape {id, category, title, body}.'
      - '`id` must be unique within its array; Blocks uses it as the open/closed accordion key.'

  add-view:
    keywords:
      - view
      - tab
    file_convention: 'Extend the `View` union and add a tab + conditional <main> block in src/App.tsx'
    registration:
      - file: 'src/App.tsx'
        action: 'Add value to `type View`, add a tab button in .view-switch, add a `{view === "..." && (...)}` section'
    validation_commands:
      - 'pnpm build'
    pattern_guide: references/patterns/add-view.md
    example_files:
      - 'src/App.tsx'
    related:
      - add-component
      - add-content-item
    anti_patterns_summary:
      - 'The three view sections are inline ternaries in App.tsx, not routed — there is no URL/router, so deep-linking is not available.'
      - 'Only the script view shows the Back/Reset header buttons (guarded by `view === "script"`); replicate that guard if your view needs its own actions.'

  add-translation:
    keywords:
      - i18n
      - translation
      - language
      - locale
      - uz
      - uzbek
    file_convention: 'UI chrome → UIStrings + UI dict in src/i18n.ts; content → parallel src/data/*.uz.ts (same keys/ids); PayScheme text → PAY dict in PayScheme.tsx'
    registration:
      - file: 'src/i18n.ts'
        action: 'Add field to UIStrings and a value in every UI[lang] block; for a new language extend Lang + LANGS'
      - file: 'src/data/*.uz.ts'
        action: 'Translate content keeping node keys / option ids / card ids identical to the RU twin'
      - file: 'src/App.tsx'
        action: 'For a new language, extend the `lang === "uz" ? *_UZ : *` dataset selectors'
    validation_commands:
      - 'pnpm build'
    pattern_guide: references/patterns/add-translation.md
    example_files:
      - 'src/i18n.ts'
      - 'src/data/script.uz.ts'
      - 'src/components/PayScheme.tsx'
    related:
      - add-content-item
      - add-script-node
      - add-view
    anti_patterns_summary:
      - 'Keep node keys / option ids / card ids identical across a dataset and its *.uz.ts twin — App indexes script[nodeId] unguarded, so a renamed/missing key crashes the script view.'
      - 'A card`s category shows as a filter chip only if it is in that language`s *_CATEGORIES tuple.'
      - 'Put translated sentences in the *.uz.ts datasets, not in i18n.ts — i18n.ts holds only short UI chrome strings.'

# =============================================================================
# PATTERN COMPOSITIONS
# =============================================================================

compositions:
  add_frontend_feature:
    description: 'Add a new top-level feature view backed by content data and a component'
    patterns:
      - pattern: add-content-item
        order: 1
        condition: 'if the feature is data-driven'
      - pattern: add-component
        order: 2
        condition: 'if existing components (e.g. Blocks) cannot render it'
      - pattern: add-view
        order: 3
    validation_sequence:
      - 'pnpm build'
    notes: 'Tips and Ambax both follow this shape: a *_CATEGORIES tuple + array in src/data, rendered by the shared Blocks component, wired as a view in App.tsx.'

observations_file: references/observations.md
